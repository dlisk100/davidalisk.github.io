<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Procedural Fog Machine workflow, playful machine option</title>
  <desc id="desc">A playful factory-line workflow showing message intake, density dial, outline furnace, streaming pipes, packet assembly, and density eleven overloader.</desc>
  <defs>
    <style>
      .bg{fill:#15130f}.paper{fill:#fffaf0}.cream{fill:#f2e8d6}.ink{fill:#f7f1e6}.muted{fill:#c8baa7}.orange{fill:#d8653d}.amber{fill:#f7c94b}.stroke{stroke:#f7c94b;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#6f6557;stroke-width:2;fill:none}.box{fill:#211d17;stroke:#5e5549;stroke-width:2}.label{font:800 24px Inter,Arial,sans-serif}.small{font:500 16px Inter,Arial,sans-serif}.mono{font:700 15px ui-monospace,SFMono-Regular,Menlo,monospace}.title{font:800 42px Inter,Arial,sans-serif;letter-spacing:.02em}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#f7c94b"/></marker>
  </defs>
  <rect class="bg" width="1400" height="780"/>
  <text x="70" y="78" class="ink title">FOG MACHINE WORKFLOW</text>
  <text x="72" y="112" class="muted small">A playful version: accurate flow, more project personality.</text>

  <g transform="translate(70 205)">
    <rect class="box" width="210" height="155" rx="10"/>
    <path class="paper" d="M55 34h80l28 28v62H55z"/>
    <path class="thin" d="M135 34v28h28M75 75h65M75 94h75M75 113h50"/>
    <text x="24" y="200" class="ink label">Scary Message</text>
    <text x="24" y="225" class="muted small">plus context and stance</text>
  </g>
  <path class="stroke" d="M305 282 H405" marker-end="url(#arrow)"/>

  <g transform="translate(430 205)">
    <rect class="box" width="210" height="155" rx="10"/>
    <circle cx="105" cy="80" r="48" fill="#2b261f" stroke="#f7c94b" stroke-width="4"/>
    <path class="stroke" d="M105 80 L138 53"/>
    <text x="64" y="86" class="amber mono">DENSITY</text>
    <text x="32" y="200" class="ink label">Slop Dial</text>
    <text x="32" y="225" class="muted small">sections, words, tokens</text>
  </g>
  <path class="stroke" d="M665 282 H765" marker-end="url(#arrow)"/>

  <g transform="translate(790 185)">
    <rect class="box" width="250" height="195" rx="10"/>
    <rect x="50" y="58" width="150" height="75" rx="8" class="orange"/>
    <circle cx="82" cy="95" r="15" fill="#15130f"/>
    <circle cx="125" cy="95" r="15" fill="#15130f"/>
    <circle cx="168" cy="95" r="15" fill="#15130f"/>
    <path class="thin" d="M65 145h120M72 158h106"/>
    <text x="30" y="220" class="ink label">Outline Furnace</text>
    <text x="30" y="245" class="muted small">/api/cannon/outline</text>
    <text x="30" y="268" class="muted small">OpenRouter default x-ai/grok-4.3</text>
  </g>
  <path class="stroke" d="M1065 282 H1165" marker-end="url(#arrow)"/>

  <g transform="translate(1180 205)">
    <rect class="box" width="150" height="155" rx="10"/>
    <path class="stroke" d="M30 55 C62 25 88 85 120 55M30 88 C62 58 88 118 120 88M30 121 C62 91 88 151 120 121"/>
    <text x="-20" y="200" class="ink label">Streaming Pipes</text>
    <text x="-20" y="225" class="muted small">/section-stream NDJSON</text>
  </g>

  <path class="stroke" d="M1255 385 C1210 460 1080 505 930 520" marker-end="url(#arrow)"/>
  <g transform="translate(660 505)">
    <rect class="box" width="320" height="145" rx="10"/>
    <rect x="36" y="28" width="248" height="90" rx="4" class="paper"/>
    <path class="thin" d="M62 55h190M62 78h170M62 101h145"/>
    <text x="35" y="185" class="ink label">Packet Assembly</text>
    <text x="35" y="210" class="muted small">live preview maps final sections</text>
  </g>

  <path class="stroke" d="M640 575 H410" marker-end="url(#arrow)"/>
  <g transform="translate(130 505)">
    <rect class="box" width="250" height="145" rx="10"/>
    <text x="28" y="55" class="amber label">Density 11</text>
    <text x="28" y="88" class="ink mono">/api/cannon/inflate</text>
    <text x="28" y="116" class="muted small">sends completed sections</text>
    <text x="28" y="140" class="muted small">back for addenda</text>
    <text x="28" y="185" class="ink label">Overloader</text>
  </g>
</svg>
